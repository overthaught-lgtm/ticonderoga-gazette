<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TSH // KINETIC SYNC // SKELETON GATE</title>
    <style>
        :root {
            --bone-white: #ece9e0;
            --accent-gold: #c5a059;
            --obsidian: #010101;
            --glitch-red: #ff003c;
            --glitch-cyan: #00f2ff;
            --pulse-intensity: 1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            background-color: var(--obsidian);
            color: var(--bone-white);
            font-family: 'Inter', 'Segoe UI', system-ui, monospace;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: 0.2em;
        }

        /* 3D skeleton canvas (fullscreen, subtle) */
        #skel-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
            opacity: 0.85;
            pointer-events: none;
        }

        /* Heartbeat line sweep */
        .pulse-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(197, 160, 89, 0.2);
            z-index: 5;
            pointer-events: none;
            transform: translateY(-50%);
            box-shadow: 0 0 12px rgba(197, 160, 89, 0.4);
        }

        .heartbeat-trigger {
            position: absolute;
            top: -40vh;
            left: -100px;
            width: 6px;
            height: 80vh;
            background: linear-gradient(180deg, var(--accent-gold), #ffd966);
            box-shadow: 0 0 30px var(--accent-gold);
            animation: pulse-swipe 4s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
            border-radius: 4px;
        }

        @keyframes pulse-swipe {
            0% { left: -10%; opacity: 0.8; }
            45% { transform: scaleY(1); opacity: 1; }
            50% { transform: scaleY(18); background: radial-gradient(circle, #ffaa33, #ff6600); box-shadow: 0 0 50px #ffaa33; } /* SPIKE: intense heartbeat */
            55% { transform: scaleY(1); opacity: 1; }
            100% { left: 110%; opacity: 0.2; }
        }

        /* PORTAL FRAME – GLASS + INTERFACE */
        .portal-frame {
            position: relative;
            z-index: 20;
            width: 82vw;
            max-width: 1100px;
            height: auto;
            min-height: 55vh;
            padding: 3rem 4rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(2, 2, 2, 0.65);
            backdrop-filter: blur(18px);
            transition: all 0.05s linear;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            border-radius: 4px;
        }

        /* GLITCH ACTIVATION (linked to heartbeat spike) */
        .glitch-active {
            animation: headroom-stutter 0.12s steps(3, end) infinite;
            border-color: var(--glitch-red) !important;
            box-shadow: 0 0 35px rgba(255, 0, 60, 0.4), inset 0 0 8px rgba(0, 242, 255, 0.3);
        }

        @keyframes headroom-stutter {
            0% { transform: translate(0, 0); filter: hue-rotate(0deg) brightness(1); }
            20% { transform: translate(4px, -2px); filter: hue-rotate(45deg) brightness(1.1); border-right-color: var(--glitch-cyan); }
            40% { transform: translate(-6px, 3px); filter: hue-rotate(90deg); text-shadow: -2px 0 var(--glitch-red); }
            60% { transform: translate(3px, 4px); filter: hue-rotate(180deg); }
            80% { transform: translate(-2px, -1px); filter: hue-rotate(270deg); }
            100% { transform: translate(1px, -2px); filter: hue-rotate(360deg); }
        }

        .title {
            font-size: 5.2rem;
            font-weight: 200;
            margin: 0.25rem 0;
            text-transform: uppercase;
            background: linear-gradient(135deg, #f5e7d3, #c5a059);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 0.3em;
            transition: letter-spacing 0.1s ease, filter 0.08s;
            text-shadow: 0 0 8px rgba(197, 160, 89, 0.4);
        }

        .subhead {
            font-size: 0.75rem;
            font-family: monospace;
            color: var(--accent-gold);
            border-left: 2px solid var(--accent-gold);
            padding-left: 12px;
            margin-top: 1rem;
        }

        .data-stream {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #b8aa7a;
            margin-top: 48px;
            background: rgba(0,0,0,0.4);
            padding: 1rem;
            border-radius: 6px;
            letter-spacing: 0.05em;
            backdrop-filter: blur(4px);
        }

        .data-stream span {
            display: inline-block;
            transition: text-shadow 0.05s linear;
        }

        .glitch-active .data-stream {
            color: #ffb347;
            text-shadow: 0 0 3px #ff003c;
        }

        /* responsive */
        @media (max-width: 760px) {
            .portal-frame { width: 90vw; padding: 1.5rem; }
            .title { font-size: 2.5rem; letter-spacing: 0.2em; }
        }

        /* extra kinetic flicker */
        .heartbeat-flash {
            animation: screen-pulse 0.2s ease-out;
        }

        @keyframes screen-pulse {
            0% { background: rgba(197,160,89,0); backdrop-filter: blur(18px);}
            50% { background: rgba(197,160,89,0.15); backdrop-filter: blur(8px);}
            100% { background: rgba(2,2,2,0.65); backdrop-filter: blur(18px);}
        }
    </style>
</head>
<body>

    <!-- 3D skeleton will render here -->
    <canvas id="skel-canvas"></canvas>

    <div class="pulse-line">
        <div class="heartbeat-trigger" id="heart"></div>
    </div>

    <div class="portal-frame" id="frame">
        <div style="font-size: 0.7rem; font-weight: 300; color: var(--accent-gold); margin-bottom: 16px; letter-spacing: 0.2em;">
            TSH // TICONDEROGA SYSTEMS | NODE: WALSENBURG // KINETIC SYNC v.9
        </div>
        <h1 class="title" id="title">TICONDEROGA</h1>
        <div class="subhead">
            █ SKELETON KEY // KINETIC OSCILLATION
        </div>
        <div class="data-stream" id="dataStream">
            > RAIN_MAN_LOGIC: ACTIVE<br>
            > LAWNMOWER_EXPANSION: ENERGIZED<br>
            > AUGUST_ROLLOUT: PHASE SYNC [98.3%]<br>
            > BONE_CONDUCTANCE: 1.618 THz
        </div>
    </div>

    <!-- Three.js core library -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- setup 3D scene, camera, renderer (reusing existing canvas) ---
        const canvas = document.getElementById('skel-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x010101, 0.25); // deep obsidian with slight transparency to blend with bg

        const scene = new THREE.Scene();
        scene.background = null; // transparent
        scene.fog = new THREE.FogExp2(0x010101, 0.012); // subtle fog

        // camera: isometric, dramatic view
        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(1.8, 1.4, 3.2);
        camera.lookAt(0, 0.2, 0);

        // Lighting: ethereal, gold/blue accents
        const ambientLight = new THREE.AmbientLight(0x221c12);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffe6c4, 1.2);
        mainLight.position.set(2, 3, 1.5);
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x4466aa, 0.45);
        fillLight.position.set(-1.2, 1.8, 2);
        scene.add(fillLight);
        
        const rimLight = new THREE.PointLight(0xc5a059, 0.8);
        rimLight.position.set(0.5, 1.2, -2);
        scene.add(rimLight);
        
        const backLight = new THREE.PointLight(0x2a2a3a, 0.5);
        backLight.position.set(0, 1, -2.5);
        scene.add(backLight);
        
        // dynamic subtle pulse light
        const heartbeatLight = new THREE.PointLight(0xc5a059, 0.4);
        heartbeatLight.position.set(0.5, 0.8, 1.2);
        scene.add(heartbeatLight);

        // --- CREATE KINETIC SKELETON MESH (articulated bone structure) ---
        const skeletonGroup = new THREE.Group();
        
        // Helper: create cylinder between two points (bones)
        function addBoneBetween(parent, p1, p2, radius, color, metalnessVal = 0.55, roughnessVal = 0.4) {
            const start = new THREE.Vector3(p1.x, p1.y, p1.z);
            const end = new THREE.Vector3(p2.x, p2.y, p2.z);
            const direction = new THREE.Vector3().subVectors(end, start);
            const length = direction.length();
            
            const geometry = new THREE.CylinderGeometry(radius, radius, length, 12);
            const material = new THREE.MeshStandardMaterial({ color: color, metalness: metalnessVal, roughness: roughnessVal, emissive: 0x331c00, emissiveIntensity: 0.12 });
            const cylinder = new THREE.Mesh(geometry, material);
            
            // center position
            const center = start.clone().add(end).multiplyScalar(0.5);
            cylinder.position.copy(center);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), direction.clone().normalize());
            parent.add(cylinder);
            return cylinder;
        }
        
        function addJoint(parent, pos, radius, color, emissiveBoost = 0.08) {
            const geometry = new THREE.SphereGeometry(radius, 24, 24);
            const material = new THREE.MeshStandardMaterial({ color: color, metalness: 0.4, roughness: 0.3, emissive: 0x442200, emissiveIntensity: emissiveBoost });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(pos.x, pos.y, pos.z);
            parent.add(sphere);
            return sphere;
        }
        
        // --- Define skeleton joint positions (normalized, relative to group) ---
        // Spine & Core
        const hipCenter = new THREE.Vector3(0, -0.25, 0);
        const spineMid = new THREE.Vector3(0, 0.15, 0);
        const chest = new THREE.Vector3(0, 0.55, 0);
        const neck = new THREE.Vector3(0, 0.78, 0);
        const head = new THREE.Vector3(0, 0.96, 0);
        
        // Left arm chain
        const leftShoulder = new THREE.Vector3(-0.36, 0.62, 0.04);
        const leftElbow = new THREE.Vector3(-0.68, 0.38, 0.02);
        const leftWrist = new THREE.Vector3(-0.86, 0.08, 0.0);
        
        // Right arm chain
        const rightShoulder = new THREE.Vector3(0.36, 0.62, 0.04);
        const rightElbow = new THREE.Vector3(0.68, 0.38, 0.02);
        const rightWrist = new THREE.Vector3(0.86, 0.08, 0.0);
        
        // Left leg chain
        const leftHip = new THREE.Vector3(-0.22, -0.22, 0);
        const leftKnee = new THREE.Vector3(-0.34, -0.62, 0);
        const leftAnkle = new THREE.Vector3(-0.27, -1.02, 0);
        
        // Right leg chain
        const rightHip = new THREE.Vector3(0.22, -0.22, 0);
        const rightKnee = new THREE.Vector3(0.34, -0.62, 0);
        const rightAnkle = new THREE.Vector3(0.27, -1.02, 0);
        
        // Extra rib / sternum detail
        const sternum = new THREE.Vector3(0, 0.35, 0.12);
        
        // Bone colors: polished ivory & ancient gold
        const boneColor = "#e2d4bc";
        const jointColor = "#c59a6b";
        const goldAccent = "#b8864b";
        
        // --- SPINE segments ---
        addBoneBetween(skeletonGroup, hipCenter, spineMid, 0.058, boneColor, 0.6);
        addBoneBetween(skeletonGroup, spineMid, chest, 0.065, boneColor, 0.65);
        addBoneBetween(skeletonGroup, chest, neck, 0.052, boneColor, 0.6);
        addBoneBetween(skeletonGroup, neck, head, 0.045, "#b78f5a", 0.5);
        
        // --- HEAD sphere---
        addJoint(skeletonGroup, head, 0.11, "#d8c9aa", 0.12);
        // decorative "temporal" rings
        const skullRing = new THREE.Mesh(
            new THREE.TorusGeometry(0.12, 0.02, 24, 48),
            new THREE.MeshStandardMaterial({ color: goldAccent, metalness: 0.7, roughness: 0.3 })
        );
        skullRing.position.set(0, 0.96, 0.08);
        skeletonGroup.add(skullRing);
        
        // --- LEFT ARM (humerus + radius/ulna)---
        addBoneBetween(skeletonGroup, leftShoulder, leftElbow, 0.048, boneColor, 0.55);
        addBoneBetween(skeletonGroup, leftElbow, leftWrist, 0.04, "#cfbc96", 0.55);
        addJoint(skeletonGroup, leftShoulder, 0.06, jointColor);
        addJoint(skeletonGroup, leftElbow, 0.052, jointColor);
        addJoint(skeletonGroup, leftWrist, 0.045, "#b8864b");
        
        // --- RIGHT ARM---
        addBoneBetween(skeletonGroup, rightShoulder, rightElbow, 0.048, boneColor, 0.55);
        addBoneBetween(skeletonGroup, rightElbow, rightWrist, 0.04, "#cfbc96", 0.55);
        addJoint(skeletonGroup, rightShoulder, 0.06, jointColor);
        addJoint(skeletonGroup, rightElbow, 0.052, jointColor);
        addJoint(skeletonGroup, rightWrist, 0.045, "#b8864b");
        
        // --- LEGS: femur + tibia---
        addBoneBetween(skeletonGroup, leftHip, leftKnee, 0.062, boneColor, 0.62);
        addBoneBetween(skeletonGroup, leftKnee, leftAnkle, 0.054, "#cbb68c", 0.58);
        addJoint(skeletonGroup, leftHip, 0.07, jointColor);
        addJoint(skeletonGroup, leftKnee, 0.058, jointColor);
        addJoint(skeletonGroup, leftAnkle, 0.05, goldAccent);
        
        addBoneBetween(skeletonGroup, rightHip, rightKnee, 0.062, boneColor, 0.62);
        addBoneBetween(skeletonGroup, rightKnee, rightAnkle, 0.054, "#cbb68c", 0.58);
        addJoint(skeletonGroup, rightHip, 0.07, jointColor);
        addJoint(skeletonGroup, rightKnee, 0.058, jointColor);
        addJoint(skeletonGroup, rightAnkle, 0.05, goldAccent);
        
        // additional clavicle aesthetics: fine bars
        const leftClav = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.38, 6), new THREE.MeshStandardMaterial({ color: "#af8f60", metalness: 0.45 }));
        leftClav.position.set(-0.26, 0.69, 0.1);
        leftClav.rotation.z = 0.35;
        skeletonGroup.add(leftClav);
        
        const rightClav = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.38, 6), new THREE.MeshStandardMaterial({ color: "#af8f60", metalness: 0.45 }));
        rightClav.position.set(0.26, 0.69, 0.1);
        rightClav.rotation.z = -0.35;
        skeletonGroup.add(rightClav);
        
        // Sternum jewel
        const sternumGem = new THREE.Mesh(new THREE.OctahedronGeometry(0.065), new THREE.MeshStandardMaterial({ color: "#d9aa48", metalness: 0.8, emissive: "#552a00", emissiveIntensity: 0.2 }));
        sternumGem.position.set(0, 0.35, 0.2);
        skeletonGroup.add(sternumGem);
        
        // --- add subtle floating particles around skeleton (kinetic energy)---
        const particleCount = 450;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 3.2;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 2.2 + 0.2;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 2.5 - 0.5;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMaterial = new THREE.PointsMaterial({ color: 0xc5a059, size: 0.012, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending });
        const particleField = new THREE.Points(particleGeometry, particleMaterial);
        skeletonGroup.add(particleField);
        
        scene.add(skeletonGroup);
        
        // store all mesh materials for heartbeat emissive pulse
        const boneMaterials = [];
        skeletonGroup.traverse((child) => {
            if (child.isMesh && child.material) {
                if (Array.isArray(child.material)) boneMaterials.push(...child.material);
                else boneMaterials.push(child.material);
            }
        });
        
        // --- dynamic skeleton rotation & subtle idle floating ---
        let timeAcc = 0;
        
        // --- HEARTBEAT SYNC: UI GLITCH + 3D FLASH, TEXT FLICKER---
        const frameDiv = document.getElementById('frame');
        const titleEl = document.getElementById('title');
        const dataStreamEl = document.getElementById('dataStream');
        
        let lastGlitchState = false;
        let pulseFlashTimeout = null;
        
        // function to trigger kinetic flash on skeleton and UI
        function triggerHeartbeatFlash() {
            // skeleton emissive spike
            boneMaterials.forEach(mat => {
                if (mat && mat.emissiveIntensity) {
                    mat.emissiveIntensity = 0.58;
                    mat.color.setHex(0xeebb77);
                }
            });
            heartbeatLight.intensity = 1.35;
            rimLight.intensity = 1.4;
            // UI additive flash
            frameDiv.classList.add('heartbeat-flash');
            dataStreamEl.style.textShadow = "0 0 5px #ffaa33";
            titleEl.style.textShadow = "0 0 12px #c5a059, 0 0 2px #ff003c";
            setTimeout(() => {
                boneMaterials.forEach(mat => {
                    if (mat && mat.emissiveIntensity) mat.emissiveIntensity = 0.12;
                });
                heartbeatLight.intensity = 0.45;
                rimLight.intensity = 0.8;
                frameDiv.classList.remove('heartbeat-flash');
                dataStreamEl.style.textShadow = "";
                titleEl.style.textShadow = "0 0 8px rgba(197, 160, 89, 0.4)";
            }, 180);
        }
        
        // Monitor heartbeat line crossing (spike zone)
        const heartElement = document.getElementById('heart');
        function checkHeartbeatCross() {
            if (!heartElement) return;
            const rect = heartElement.getBoundingClientRect();
            const screenCenterX = window.innerWidth / 2;
            // when the pulse line's visual spike (approx center) passes through center -> intense sync
            // using width of element to detect crossing; plus we check left coordinate within center zone
            const isCrossing = (rect.left < screenCenterX + 40 && rect.right > screenCenterX - 40);
            
            if (isCrossing) {
                if (!lastGlitchState) {
                    // ACTIVATE glitch class on frame
                    frameDiv.classList.add('glitch-active');
                    titleEl.style.letterSpacing = "0.75em";
                    // add energy to skeleton
                    triggerHeartbeatFlash();
                    lastGlitchState = true;
                }
            } else {
                if (lastGlitchState) {
                    frameDiv.classList.remove('glitch-active');
                    titleEl.style.letterSpacing = "0.3em";
                    lastGlitchState = false;
                }
            }
            requestAnimationFrame(checkHeartbeatCross);
        }
        
        // start scanning heartbeat pulse
        checkHeartbeatCross();
        
        // additional data-stream flicker for dramatic glitch moments (added random effect for immersion)
        setInterval(() => {
            if (frameDiv.classList.contains('glitch-active')) {
                const lines = dataStreamEl.innerHTML.split('<br>');
                if (lines.length > 2) {
                    // random distortion
                    const randomIndex = Math.floor(Math.random() * lines.length);
                    lines[randomIndex] = lines[randomIndex].replace(/[A-Z0-9]/g, (c) => String.fromCharCode(c.charCodeAt(0) + (Math.random() > 0.7 ? 1 : 0)));
                    dataStreamEl.innerHTML = lines.join('<br>');
                    setTimeout(() => {
                        dataStreamEl.innerHTML = "> RAIN_MAN_LOGIC: ACTIVE<br>> LAWNMOWER_EXPANSION: ENERGIZED<br>> AUGUST_ROLLOUT: PHASE SYNC [98.3%]<br>> BONE_CONDUCTANCE: 1.618 THz";
                    }, 120);
                }
            }
        }, 500);
        
        // --- ANIMATION LOOP: floating skeleton rotation & particle swirl, subtle camera drift ---
        let clock = new THREE.Clock();
        
        function animate() {
            const delta = clock.getDelta();
            const elapsed = performance.now() / 1000;
            
            // rotation & kinetic motion: smooth axial rotation + slight tilt breathing
            skeletonGroup.rotation.y = Math.sin(elapsed * 0.2) * 0.18 + elapsed * 0.2;
            skeletonGroup.rotation.x = Math.sin(elapsed * 0.37) * 0.07;
            skeletonGroup.rotation.z = Math.sin(elapsed * 0.23) * 0.04;
            
            // floating particles orbit slowly
            particleField.rotation.y += 0.004;
            particleField.rotation.x = Math.sin(elapsed * 0.15) * 0.1;
            
            // dynamic camera micro-motion (organic sync)
            camera.position.x += (Math.sin(elapsed * 0.2) * 0.003 - (camera.position.x - 1.8)) * 0.03;
            camera.position.y += (Math.cos(elapsed * 0.31) * 0.002 - (camera.position.y - 1.35)) * 0.03;
            camera.lookAt(0, 0.3, 0);
            
            // gold emissive pulse subtle based on heartbeat but also independent
            const pulseFactor = 0.5 + Math.sin(elapsed * 12) * 0.1;
            if (!frameDiv.classList.contains('glitch-active')) {
                heartbeatLight.intensity = 0.45 + Math.sin(elapsed * 14) * 0.15;
            }
            
            // small joint glow pulsation
            sternumGem.material.emissiveIntensity = 0.2 + Math.sin(elapsed * 9) * 0.1;
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // --- handle resize ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // manual flash at start for dramatic effect
        setTimeout(() => {
            triggerHeartbeatFlash();
            frameDiv.classList.add('glitch-active');
            titleEl.style.letterSpacing = "0.75em";
            setTimeout(() => {
                if (!lastGlitchState) frameDiv.classList.remove('glitch-active');
                titleEl.style.letterSpacing = "0.3em";
            }, 280);
        }, 500);
        
        // console log to verify kinetic skeleton loaded
        console.log('TSH // KINETIC SKELETON SYNC ACTIVE');
    </script>
</body>
</html>
