<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  
  <!-- Accent lines -->
  <rect x="0" y="0" width="1200" height="4" fill="#00d4ff"/>
  <rect x="0" y="626" width="1200" height="4" fill="#00d4ff"/>
  
  <!-- Center node / T mark -->
  <circle cx="600" cy="240" r="40" fill="none" stroke="#00d4ff" stroke-width="3"/>
  <circle cx="600" cy="240" r="12" fill="#00d4ff"/>
  
  <!-- Connected nodes (BEANS network visual) -->
  <circle cx="520" cy="200" r="6" fill="#00d4ff" opacity="0.6"/>
  <circle cx="680" cy="200" r="6" fill="#00d4ff" opacity="0.6"/>
  <circle cx="520" cy="280" r="6" fill="#00d4ff" opacity="0.6"/>
  <circle cx="680" cy="280" r="6" fill="#00d4ff" opacity="0.6"/>
  
  <!-- Connection lines -->
  <line x1="520" y1="200" x2="600" y2="240" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <line x1="680" y1="200" x2="600" y2="240" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <line x1="520" y1="280" x2="600" y2="240" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <line x1="680" y1="280" x2="600" y2="240" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  
  <!-- Title -->
  <text x="600" y="380" font-family="monospace" font-size="42" fill="#ffffff" text-anchor="middle" letter-spacing="4">TICONDEROGA SYSTEMS</text>
  
  <!-- Subtitle -->
  <text x="600" y="430" font-family="monospace" font-size="20" fill="#00d4ff" text-anchor="middle" letter-spacing="8">GAZETTE</text>
  
  <!-- Tagline -->
  <text x="600" y="520" font-family="monospace" font-size="14" fill="#666666" text-anchor="middle" letter-spacing="2">BEANS NETWORK • UNIVERSAL HAND OFF • UHO PROTOCOL</text>
  
  <!-- Bottom right marker -->
  <text x="1140" y="590" font-family="monospace" font-size="10" fill="#333333" text-anchor="end">v1.0</text>
</svg>
